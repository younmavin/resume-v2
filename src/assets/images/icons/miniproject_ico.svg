<svg xmlns="http://www.w3.org/2000/svg" width="90" height="72" viewBox="0 0 90 72">
  <defs>
    <linearGradient id="folderFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#F5A800"/>
      <stop offset="100%" stop-color="#CC7A00"/>
    </linearGradient>
    <linearGradient id="folderBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCC30"/>
      <stop offset="100%" stop-color="#D07800"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8EEF8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#00000055"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- 뒤 폴더 -->
    <path d="M5,10 Q5,6 9,6 L28,6 Q33,6 34,10 L34,14 L83,14 Q87,14 87,18 L87,66 Q87,70 83,70 L5,70 Q1,70 1,66 L1,14 Q1,10 5,10 Z"
          fill="url(#folderBack)" stroke="#1a1a1a" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- 서류 -->
    <rect x="27" y="8" width="34" height="44" rx="2" fill="url(#paperGrad)" stroke="#AABBCC" stroke-width="1"/>
    <rect x="32" y="22" width="20" height="2.5" rx="1.2" fill="#7A9AE0"/>
    <rect x="32" y="28" width="24" height="2" rx="1" fill="#B0C4DC"/>
    <rect x="32" y="33" width="22" height="2" rx="1" fill="#B0C4DC"/>
    <rect x="32" y="38" width="18" height="2" rx="1" fill="#B0C4DC"/>
    <rect x="32" y="43" width="20" height="2" rx="1" fill="#C8D8EC"/>
    <!-- 앞 폴더 -->
    <path d="M5,20 Q5,16 9,16 L30,16 Q35,16 36,20 L36,24 L83,24 Q87,24 87,28 L87,66 Q87,70 83,70 L5,70 Q1,70 1,66 L1,24 Q1,20 5,20 Z"
          fill="url(#folderFront)" stroke="#1a1a1a" stroke-width="1.2" stroke-linejoin="round"/>
  </g>
</svg>

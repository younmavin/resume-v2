<svg xmlns="http://www.w3.org/2000/svg" width="62" height="74" viewBox="0 0 62 74">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#00000055"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- 문서 본체 -->
    <rect x="2" y="2" width="52" height="68" rx="2" fill="#FFFFFF"/>
    <!-- 접힌 모서리 -->
    <polygon points="54,2 54,16 40,2" fill="#BBBBBB"/>
    <polygon points="40,2 54,16 40,16" fill="#DDDDDD"/>
    <!-- 줄 -->
    <line x1="10" y1="24" x2="46" y2="24" stroke="#CCCCCC" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="31" x2="46" y2="31" stroke="#CCCCCC" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="38" x2="46" y2="38" stroke="#CCCCCC" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="45" x2="46" y2="45" stroke="#CCCCCC" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="52" x2="46" y2="52" stroke="#CCCCCC" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="59" x2="38" y2="59" stroke="#CCCCCC" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 외곽 테두리 -->
    <rect x="2" y="2" width="52" height="68" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  </g>
</svg>

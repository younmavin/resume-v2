<svg xmlns="http://www.w3.org/2000/svg" width="80" height="74" viewBox="0 0 80 74">
  <defs>
    <linearGradient id="titleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A246A"/>
      <stop offset="100%" stop-color="#4A90D9"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0EEDD"/>
      <stop offset="100%" stop-color="#D4D0C8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="2.5" flood-color="#00000055"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- 창 본체 -->
    <rect x="2" y="2" width="76" height="70" rx="3" fill="url(#bodyGrad)" stroke="#1a1a1a" stroke-width="1.2"/>
    <!-- 타이틀바 -->
    <rect x="2" y="2" width="76" height="14" rx="3" fill="url(#titleBar)"/>
    <rect x="2" y="10" width="76" height="6" fill="url(#titleBar)"/>
    <!-- 창 버튼들 -->
    <rect x="56" y="5" width="7" height="7" rx="1" fill="#D4D0C8" stroke="#888" stroke-width="0.6"/>
    <rect x="65" y="5" width="7" height="7" rx="1" fill="#D4D0C8" stroke="#888" stroke-width="0.6"/>
    <rect x="65" y="5" width="7" height="7" rx="1" fill="#CC4444" stroke="#AA2222" stroke-width="0.6"/>
    <!-- 타이틀 텍스트 -->
    <text x="8" y="12" font-size="7" fill="white" font-family="Tahoma, Arial" font-weight="bold">Portfolio</text>
    <!-- 주소창 -->
    <rect x="6" y="18" width="68" height="8" rx="1" fill="white" stroke="#888" stroke-width="0.8"/>
    <text x="10" y="25" font-size="5.5" fill="#446" font-family="Arial">http://mavin-portfolio.com</text>
    <!-- 콘텐츠 영역 -->
    <rect x="6" y="28" width="68" height="40" rx="1" fill="white" stroke="#CCCCCC" stroke-width="0.5"/>
    <!-- 콘텐츠 줄 -->
    <rect x="10" y="33" width="30" height="4" rx="1" fill="#4A90D9" opacity="0.8"/>
    <rect x="10" y="40" width="56" height="2.5" rx="1" fill="#CCCCCC"/>
    <rect x="10" y="45" width="48" height="2.5" rx="1" fill="#CCCCCC"/>
    <rect x="10" y="50" width="52" height="2.5" rx="1" fill="#CCCCCC"/>
    <rect x="10" y="55" width="40" height="2.5" rx="1" fill="#CCCCCC"/>
    <rect x="10" y="60" width="44" height="2.5" rx="1" fill="#CCCCCC"/>
  </g>
</svg>
